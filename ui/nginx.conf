server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Use Docker's internal DNS so nginx re-resolves after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API calls to the FastAPI service (no CORS needed)
    # set MUST come before rewrite (rewrite+break skips later rewrite-phase directives)
    # $uri is updated by the rewrite, so proxy_pass picks up the stripped path
    location /api/ {
        set $backend http://agent-api:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         $backend$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # Serve the SPA for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
